<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mixtiles QR Code Converter</title>
<script src="qrcode.min.js"></script>
<style>
  :root {
    --mixtiles-blue: #1b3a5c;
    --accent: #2f6fed;
    --bg: #f4f6f9;
    --card-bg: #ffffff;
    --border: #dde3ea;
    --text: #1b2733;
    --muted: #6b7684;
    --error: #c0392b;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    background: var(--bg);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    color: var(--text);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 36px;
    width: 100%;
    max-width: 480px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.06);
  }
  h1 {
    font-size: 20px;
    margin: 0 0 4px;
    color: var(--mixtiles-blue);
  }
  p.subtitle {
    margin: 0 0 24px;
    color: var(--muted);
    font-size: 14px;
  }
  label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    margin-bottom: 6px;
    color: var(--muted);
  }
  input#scanInput {
    width: 100%;
    padding: 14px 16px;
    font-size: 16px;
    border: 2px solid var(--border);
    border-radius: 10px;
    outline: none;
    transition: border-color 0.15s ease;
  }
  input#scanInput:focus {
    border-color: var(--accent);
  }
  .hint {
    font-size: 12px;
    color: var(--muted);
    margin-top: 8px;
  }
  .result {
    margin-top: 28px;
    display: none;
  }
  .result.visible {
    display: block;
  }
  .qr-box {
    display: flex;
    justify-content: center;
    padding: 20px;
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 12px;
  }
  .extracted {
    margin-top: 14px;
    text-align: center;
  }
  .extracted .value {
    display: inline-block;
    font-family: "SF Mono", Consolas, Menlo, monospace;
    font-size: 15px;
    font-weight: 600;
    background: #eef2fb;
    color: var(--accent);
    padding: 6px 14px;
    border-radius: 8px;
    word-break: break-all;
  }
  .error {
    margin-top: 20px;
    display: none;
    background: #fdecea;
    border: 1px solid #f5c6c0;
    color: var(--error);
    padding: 12px 16px;
    border-radius: 10px;
    font-size: 14px;
  }
  .error.visible {
    display: block;
  }
  .actions {
    margin-top: 20px;
    display: flex;
    justify-content: center;
  }
  button#resetBtn {
    border: none;
    background: var(--mixtiles-blue);
    color: #fff;
    font-size: 14px;
    font-weight: 600;
    padding: 10px 20px;
    border-radius: 8px;
    cursor: pointer;
  }
  button#resetBtn:hover {
    opacity: 0.9;
  }
  footer {
    margin-top: 28px;
    text-align: center;
    font-size: 11px;
    color: var(--muted);
  }
</style>
</head>
<body>
  <div class="card">
    <h1>Mixtiles QR Code Converter</h1>
    <p class="subtitle">Scan a code below to generate a new QR code containing only its <code>utm_source</code> value.</p>

    <label for="scanInput">Scan here</label>
    <input id="scanInput" type="text" autocomplete="off" autocapitalize="off" spellcheck="false" placeholder="Click here, then scan a barcode...">
    <div class="hint">This field stays focused automatically &mdash; just point the scanner and scan.</div>

    <div class="error" id="errorBox"></div>

    <div class="result" id="resultBox">
      <div class="qr-box" id="qrBox"></div>
      <div class="extracted">
        <div class="value" id="extractedValue"></div>
      </div>
      <div class="actions">
        <button id="resetBtn" type="button">Scan another</button>
      </div>
    </div>

    <footer>Mixtiles internal tool &middot; processing happens entirely in your browser</footer>
  </div>

<script>
(function () {
  var scanInput = document.getElementById('scanInput');
  var resultBox = document.getElementById('resultBox');
  var errorBox = document.getElementById('errorBox');
  var qrBox = document.getElementById('qrBox');
  var extractedValue = document.getElementById('extractedValue');
  var resetBtn = document.getElementById('resetBtn');

  function extractUtmSource(raw) {
    if (!raw) return null;

    var s = raw.trim();

    // Take only the query-string portion, whether it's a full URL or a bare param string.
    var qIndex = s.indexOf('?');
    if (qIndex !== -1) {
      s = s.substring(qIndex + 1);
    } else if (s.indexOf('=') === -1) {
      return null;
    }

    // Normalize stray whitespace scanners sometimes introduce around '&' or '='.
    s = s.replace(/\s*&\s*/g, '&').replace(/\s*=\s*/g, '=').trim();

    var pairs = s.split('&');
    for (var i = 0; i < pairs.length; i++) {
      var pair = pairs[i];
      if (!pair) continue;
      var eqIndex = pair.indexOf('=');
      if (eqIndex === -1) continue;
      var key = pair.substring(0, eqIndex).trim();
      var value = pair.substring(eqIndex + 1).trim();
      if (key === 'utm_source' && value) {
        try {
          return decodeURIComponent(value);
        } catch (e) {
          return value;
        }
      }
    }
    return null;
  }

  function showError(message) {
    errorBox.textContent = message;
    errorBox.classList.add('visible');
    resultBox.classList.remove('visible');
  }

  function showResult(value) {
    errorBox.classList.remove('visible');
    qrBox.innerHTML = '';

    var qr = qrcode(0, 'M'); // type 0 = auto-detect smallest size, error correction level M
    qr.addData(value);
    qr.make();
    qrBox.innerHTML = qr.createSvgTag({ cellSize: 6, margin: 4 });

    extractedValue.textContent = value;
    resultBox.classList.add('visible');
  }

  function handleScan(raw) {
    var value = extractUtmSource(raw);
    if (!value) {
      showError('Could not find a "utm_source" value in the scanned text. Please check the scanned code and try again.');
      return;
    }
    showResult(value);
  }

  scanInput.addEventListener('keydown', function (e) {
    if (e.key === 'Enter') {
      e.preventDefault();
      var raw = scanInput.value;
      scanInput.value = '';
      if (raw.trim()) {
        handleScan(raw);
      }
    }
  });

  resetBtn.addEventListener('click', function () {
    resultBox.classList.remove('visible');
    errorBox.classList.remove('visible');
    scanInput.value = '';
    scanInput.focus();
  });

  document.addEventListener('click', function () {
    scanInput.focus();
  });

  window.addEventListener('load', function () {
    scanInput.focus();
  });
})();
</script>
</body>
</html>
